version: '3.8'
name: subscription

services:
  postgres:
    image: postgres:17-alpine
    container_name: effective_mobile_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: effective_mobile_migrate
    volumes:
      - ./internal/repository/db/migrations:/migrations
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .                    
      dockerfile: Dockerfile     
    container_name: effective_mobile_app
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8080"
    environment:
      POSTGRES_HOST: ${POSTGRES_USER}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_PORT: ${APP_PORT}
      APP_LOG_PATH: ${APP_LOG_PATH}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data: